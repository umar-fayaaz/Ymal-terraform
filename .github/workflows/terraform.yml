name: Terraform Wrapper Pipeline

on:
  push:
    paths:
      - "agents/**/*.yml"
      - "agents/**/*.yaml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:
  # Detect every changed agent YAML and run one matrix item per agent folder.
  detect-agents:
    name: Detect Changed Agent YAML Files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix from changed agent YAML files
        id: build-matrix
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t CHANGED < <(git ls-files "agents/**/*.yml" "agents/**/*.yaml" | sort -u)
          else
            mapfile -t CHANGED < <(git diff --name-only --diff-filter=AM "${BEFORE_SHA}" "${CURRENT_SHA}" -- "agents/**/*.yml" "agents/**/*.yaml" | sort -u)
          fi

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_LIST=$(python -c 'import json,sys; files=[arg.strip() for arg in sys.argv[1:] if arg.strip()]; print(json.dumps({"include": [{"agent_yaml": f} for f in files]}))' "${CHANGED[@]}")

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=${JSON_LIST}" >> "$GITHUB_OUTPUT"

  terraform-plan:
    name: Terraform Plan
    needs: detect-agents
    if: needs.detect-agents.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-agents.outputs.matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python requirements
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Extract agent metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          python -c 'import os; from pathlib import Path; import yaml; agent_yaml=Path(os.environ["AGENT_YAML"]); data=yaml.safe_load(open(agent_yaml, "r", encoding="utf-8")); assert isinstance(data, dict); agent=data.get("agent"); assert isinstance(agent, str) and agent.strip(); agent=agent.strip(); agent_dir=str(agent_yaml.parent).replace("\\\\", "/"); tf_workdir=f"{agent_dir}/output"; plan_name=f"{agent}.tfplan"; state_key=f"{agent}/terraform.tfstate"; artifact_name=f"tfplan-{agent}"; plan_summary_file=f"{agent}-plan.txt"; out=open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8"); out.write(f"agent={agent}\n"); out.write(f"tf_workdir={tf_workdir}\n"); out.write(f"plan_name={plan_name}\n"); out.write(f"state_key={state_key}\n"); out.write(f"artifact_name={artifact_name}\n"); out.write(f"plan_summary_file={plan_summary_file}\n")'
        env:
          AGENT_YAML: ${{ matrix.agent_yaml }}

      - name: Generate Terraform using Python wrapper
        run: |
          set -euo pipefail
          python app.py "${{ matrix.agent_yaml }}"

      - name: Prepare Terraform files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ steps.meta.outputs.tf_workdir }}"

          cat > "${{ steps.meta.outputs.tf_workdir }}/backend.tf" <<'EOF'
          terraform {
            backend "azurerm" {}
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 3.0"
              }
            }
          }

          provider "azurerm" {
            features {}
          }
          EOF

      - name: Azure CLI Login
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"

          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform fmt
        run: terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" fmt -check -recursive

      - name: Terraform init with remote backend
        run: |
          terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="resource_group_name=${{ secrets.RESOURCE_GROUP }}" \
            -backend-config="key=${{ steps.meta.outputs.state_key }}"

      - name: Terraform validate
        run: terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" validate

      - name: Terraform plan
        run: |
          terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" plan \
            -out="${{ steps.meta.outputs.plan_name }}"

      # Render the generated plan to a readable text file for reviewers.
      - name: Render plan for review
        run: |
          terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" show -no-color "${{ steps.meta.outputs.plan_name }}" > "${{ steps.meta.outputs.plan_summary_file }}"

      # Publish the plan summary to the GitHub Actions run summary.
      - name: Publish plan summary
        shell: bash
        run: |
          {
            echo "## Terraform Plan - ${{ steps.meta.outputs.agent }}"
            echo ""
            echo "Backend key: ${{ steps.meta.outputs.state_key }}"
            echo ""
            echo "\`\`\`hcl"
            cat "${{ steps.meta.outputs.plan_summary_file }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.meta.outputs.plan_summary_file }}
            ${{ steps.meta.outputs.tf_workdir }}/${{ steps.meta.outputs.plan_name }}
          if-no-files-found: error
          retention-days: 7

  terraform-apply:
    name: Terraform Apply
    needs:
      - detect-agents
      - terraform-plan
    if: needs.detect-agents.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-agents.outputs.matrix) }}
    environment:
      name: Production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python requirements
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Extract agent metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          python -c 'import os; from pathlib import Path; import yaml; agent_yaml=Path(os.environ["AGENT_YAML"]); data=yaml.safe_load(open(agent_yaml, "r", encoding="utf-8")); assert isinstance(data, dict); agent=data.get("agent"); assert isinstance(agent, str) and agent.strip(); agent=agent.strip(); agent_dir=str(agent_yaml.parent).replace("\\\\", "/"); tf_workdir=f"{agent_dir}/output"; plan_name=f"{agent}.tfplan"; state_key=f"{agent}/terraform.tfstate"; artifact_name=f"tfplan-{agent}"; plan_summary_file=f"{agent}-plan.txt"; out=open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8"); out.write(f"tf_workdir={tf_workdir}\n"); out.write(f"plan_name={plan_name}\n"); out.write(f"state_key={state_key}\n"); out.write(f"artifact_name={artifact_name}\n"); out.write(f"plan_summary_file={plan_summary_file}\n")'
        env:
          AGENT_YAML: ${{ matrix.agent_yaml }}

      - name: Generate Terraform using Python wrapper
        run: |
          set -euo pipefail
          python app.py "${{ matrix.agent_yaml }}"

      - name: Prepare Terraform files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ steps.meta.outputs.tf_workdir }}"

          cat > "${{ steps.meta.outputs.tf_workdir }}/backend.tf" <<'EOF'
          terraform {
            backend "azurerm" {}
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = ">= 3.0"
              }
            }
          }

          provider "azurerm" {
            features {}
          }
          EOF

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: plans

      - name: Azure CLI Login
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"

          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform init with remote backend
        run: |
          terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="resource_group_name=${{ secrets.RESOURCE_GROUP }}" \
            -backend-config="key=${{ steps.meta.outputs.state_key }}"

      - name: Terraform apply from approved plan
        run: terraform -chdir="${{ steps.meta.outputs.tf_workdir }}" apply -input=false "${{ github.workspace }}/plans/${{ steps.meta.outputs.plan_name }}"
